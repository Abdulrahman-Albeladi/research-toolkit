[tool.ruff]
# Project-specific Ruff configuration. This repository keeps analysis notebooks
# under `notebooks/` which are not intended to be linted by Ruff. Exclude that
# directory so Ruff focuses on code in src/ and tests/.
line-length = 88
# Exclude notebooks and common virtualenv/build dirs.
exclude = [
  "notebooks/**",
  "**/notebooks/**",
  "venv/**",
  ".venv/**",
  "build/**",
  "dist/**",
  "node_modules/**"
]
